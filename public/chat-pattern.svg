<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <g fill="none" stroke="#d4ccbf" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.55">
    <!-- Heart -->
    <path d="M28 56 C20 50 20 40 28 38 C33 37 37 41 39 44 C41 41 45 37 50 38 C58 40 58 50 50 56 L39 66 Z"/>

    <!-- Flower (4 petals) -->
    <g transform="translate(170 32)">
      <circle cx="0" cy="0" r="2.5"/>
      <path d="M0 -11 C-3 -7 -3 -3 0 -3 C3 -3 3 -7 0 -11 Z"/>
      <path d="M0 11 C-3 7 -3 3 0 3 C3 3 3 7 0 11 Z"/>
      <path d="M-11 0 C-7 -3 -3 -3 -3 0 C-3 3 -7 3 -11 0 Z"/>
      <path d="M11 0 C7 -3 3 -3 3 0 C3 3 7 3 11 0 Z"/>
    </g>

    <!-- Smiley -->
    <g transform="translate(95 110)">
      <circle cx="0" cy="0" r="13"/>
      <circle cx="-4.5" cy="-3" r="1.1"/>
      <circle cx="4.5" cy="-3" r="1.1"/>
      <path d="M-6 4 Q0 9 6 4"/>
    </g>

    <!-- Star -->
    <path d="M195 145 L198.5 153 L207 153.5 L200.3 159 L202.8 167 L195 162.2 L187.2 167 L189.7 159 L183 153.5 L191.5 153 Z"/>

    <!-- Paper airplane -->
    <g transform="translate(45 175) rotate(15)">
      <path d="M0 0 L26 -8 L18 4 L13 12 Z"/>
      <path d="M18 4 L13 -1"/>
    </g>

    <!-- Music note -->
    <g transform="translate(150 195)">
      <path d="M-2 -2 L-2 -16 L10 -19 L10 -3"/>
      <ellipse cx="-5" cy="-1" rx="3.2" ry="2.2"/>
      <ellipse cx="7" cy="-4" rx="3.2" ry="2.2"/>
    </g>

    <!-- Diamond -->
    <path d="M210 78 L216 84 L210 90 L204 84 Z"/>

    <!-- Speech bubble -->
    <g transform="translate(115 50)">
      <path d="M-12 -4 Q-12 -10 -6 -10 L8 -10 Q14 -10 14 -4 Q14 2 8 2 L-1 2 L-5 6 L-5 2 Q-12 2 -12 -4 Z"/>
    </g>

    <!-- Cup -->
    <g transform="translate(58 110)">
      <path d="M-7 -4 L-7 6 Q-7 9 -4 9 L4 9 Q7 9 7 6 L7 -4 Z"/>
      <path d="M7 -1 Q11 -1 11 2 Q11 5 7 5"/>
      <path d="M-7 -4 L7 -4"/>
      <path d="M-3 -9 Q-3 -7 -3 -5 M0 -9 Q0 -7 0 -5 M3 -9 Q3 -7 3 -5"/>
    </g>

    <!-- Sun -->
    <g transform="translate(35 220)">
      <circle cx="0" cy="0" r="6"/>
      <path d="M0 -10 L0 -13 M0 10 L0 13 M-10 0 L-13 0 M10 0 L13 0 M-7 -7 L-9 -9 M7 -7 L9 -9 M-7 7 L-9 9 M7 7 L9 9"/>
    </g>

    <!-- Cloud -->
    <g transform="translate(190 220)">
      <path d="M-12 0 Q-15 -3 -12 -6 Q-9 -9 -5 -7 Q-3 -11 2 -10 Q7 -9 8 -5 Q12 -5 12 -1 Q12 3 8 3 L-9 3 Q-13 3 -12 0 Z"/>
    </g>

    <!-- Tiny dots scattered -->
    <circle cx="78" cy="60" r="1.2" fill="#d4ccbf" stroke="none"/>
    <circle cx="225" cy="115" r="1.2" fill="#d4ccbf" stroke="none"/>
    <circle cx="20" cy="155" r="1.2" fill="#d4ccbf" stroke="none"/>
    <circle cx="135" cy="155" r="1.2" fill="#d4ccbf" stroke="none"/>
  </g>
</svg>
